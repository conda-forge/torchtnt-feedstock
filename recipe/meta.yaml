{% set name = "torchtnt" %}
{% set version = "0.2.4" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  - url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/torchtnt-{{ version }}.tar.gz
    sha256: 26cf4e718965afc293e76158b47283722055bcf79e94d0e67e70b5dbf61c0c9b
  - url: https://github.com/pytorch/tnt/blob/077c1fe27dc32ede6b0d7e86cdd6aacf04bf6b3e/requirements.txt
    sha256: 5fabb667f3ef24ab168e771212f38fe9d4f57b4ff27d530bef30b3c05daf4538
  - url: https://github.com/pytorch/tnt/blob/077c1fe27dc32ede6b0d7e86cdd6aacf04bf6b3e/dev-requirements.txt
    sha256: 7a0303c2b5a57c44f87cbb07e8196d0d5180687e307b6599aec16c2dcf8ab0b8

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 1

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools
  run:
    - fsspec
    - numpy
    - packaging
    - psutil
    - pyre-extensions
    - python >={{ python_min }}
    - setuptools
    - tensorboard
    - pytorch
    - tabulate
    - torchsnapshot
    - tqdm
    - typing-extensions

test:
  imports:
    - torchtnt
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/pytorch/tnt
  summary: A lightweight library for PyTorch training tools and utilities
  license: BSD-3-Clause
  license_file:
    - LICENSE

extra:
  recipe-maintainers:
    - sarthakpati
